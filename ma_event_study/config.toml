[run]
# Можно указать имя переменной окружения с токеном (по умолчанию INVEST_TOKEN)
token_env = "INVEST_TOKEN"

# Автосохранение чекпоинтов по исходным строкам (audit)
autosave_every = 25

# Симметричное окно (legacy): если не заданы pre/post, в коде может использоваться как fallback
daily_window = 250
# Асимметрия для market model: запас ~30 торговых дней сверх окна оценки [-250,-30]
daily_window_pre = 280
daily_window_post = 60

# Если true — строки с неразрешённым тикером не обрабатываются дальше (только audit). Если false — все строки
# попадают в table_1 / table_2 с пометкой в pipeline_row_note, расчёты потом отфильтруют сами.
ignore_unresolved_rows = false

[model]
# Единое оценочное окно для market model (ma_thesis_pipeline + car_event_study)
estimation_window_start = -250
estimation_window_end = -30

[input]
# Excel со сделками M&A (ma_deals.xlsx по ТЗ)
xlsx = "../data/input/ma_deals.xlsx"

# Если нужно принудительно выбрать лист (иначе скрипт сам подберёт или возьмёт первый)
# sheet_name = "Deals_sorted"

[output]
dir = "../out"

[financials]
# Папка с файлами финансовых метрик (csv/xlsx). Не обязательна.
# В эту же папку можно положить RUONIA/IMOEX, если не задаёте [benchmarks].
dir = "../data/financials"

[benchmarks]
# Файлы с временными рядами (csv/xlsx), если хотите задать явно.
# imoex = "../benchmarks/imoex.csv"
# ruonia = "../benchmarks/ruonia.csv"

